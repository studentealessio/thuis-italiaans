    <script src="js/app-nav.js"></script>
    <script>
    (function(){
      const data = JSON.parse(document.getElementById('data').textContent);
      const container = document.getElementById('content');
      const buttons = document.querySelectorAll('.lang-switcher button');
      const RTL_LANGS = ['ar'];

      function render(lang){
        const d = data[lang];
        if(!d) return;
        const first = d.sections[0];
        const rest = d.sections.slice(1);
        let html = '';
        html += '<h1>' + first.titolo + '</h1>';
        if(d.mt_notice){
          html += '<p class="legal-mt-notice">' + d.mt_notice + '</p>';
        }
        const dateMatch = first.corpo.match(/^(Ultimo aggiornamento:[^.]+\.|Last updated:[^.]+\.|Laatst bijgewerkt:[^.]+\.|Zuletzt aktualisiert:[^.]+\.|Dernière mise à jour[^.]+\.|Última actualización:[^.]+\.|Última atualização:[^.]+\.|Ultima actualizare:[^.]+\.|Останнє оновлення:[^.]+\.|Përditësuar së fundmi:[^.]+\.|آخر تحديث:[^.]+\.|সর্বশেষ আপডেট:[^.]+।|最后更新:[^。]+。|Huling na-update:[^.]+\.|ናይ መወዳእታ ምዕባለ[^።]+።)\s*/);
        if(dateMatch){
          html += '<p class="legal-updated">' + dateMatch[1].trim() + '</p>';
          html += '<p>' + first.corpo.slice(dateMatch[0].length) + '</p>';
        } else {
          html += '<p>' + first.corpo + '</p>';
        }
        for(const s of rest){
          html += '<h2>' + s.titolo + '</h2>';
          html += '<p>' + s.corpo + '</p>';
        }
        container.innerHTML = html;
        document.documentElement.lang = lang;
        document.documentElement.dir = RTL_LANGS.includes(lang) ? 'rtl' : 'ltr';
        buttons.forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
        if(window.applyAppNav) window.applyAppNav(lang);
        try { localStorage.setItem('ti-lang', lang); } catch(e){}
      }

      buttons.forEach(b => b.addEventListener('click', () => render(b.dataset.lang)));

      let initial = 'nl';
      try {
        const saved = localStorage.getItem('ti-lang');
        if(saved && data[saved]) initial = saved;
      } catch(e){}
      // browser language auto-detect on first visit
      if(!localStorage.getItem('ti-lang')){
        const browserLang = (navigator.language || 'nl').slice(0, 2).toLowerCase();
        if(data[browserLang]) initial = browserLang;
      }
      render(initial);
    })();
    </script>
