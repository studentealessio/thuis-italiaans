    :root{

    .lang button.active{background:#fff;color:var(--primary);box-shadow:0 1px 3px rgba(0,0,0,.08)}

    h2{font-size:1.2rem;margin:2rem 0 .6rem;color:var(--primary)}
    p{margin:0 0 1rem;color:#2a3244}

    .placeholder-note{
      background:#fff8e1;border:1px solid #f0d878;color:#6b5100;
      padding:.85rem 1rem;border-radius:10px;font-size:.9rem;margin-bottom:1.75rem;

<script>
(function(){
  const data = JSON.parse(document.getElementById('data').textContent);
  const container = document.getElementById('content');
  const backSpan = document.querySelector('[data-back]');
  const buttons = document.querySelectorAll('.lang button');

  function render(lang){
    const d = data[lang];
    const first = d.sections[0];
    const rest = d.sections.slice(1);
    const [firstLine, ...restOfCorpo] = first.corpo.split('. ');
    // Prima sezione: titolo diventa H1, prima frase diventa "updated", resto diventa paragrafo
    // Split più semplice: mostro H1 + intero corpo come intro; il "Ultimo aggiornamento" è già dentro il testo.
    let html = '';
    html += '<h1>' + first.titolo + '</h1>';
    // estraggo la data se presente
    const dateMatch = first.corpo.match(/^(Ultimo aggiornamento:[^.]+\.|Last updated:[^.]+\.|Laatst bijgewerkt:[^.]+\.)\s*/);
    if(dateMatch){
      html += '<p class="updated">' + dateMatch[1] + '</p>';
      html += '<p>' + first.corpo.slice(dateMatch[0].length) + '</p>';
    } else {
      html += '<p>' + first.corpo + '</p>';
    }
    // Nota placeholder se il testo contiene [Nome...] o [adres]
    if(first.corpo.match(/\[[^\]]+\]/)){
      const notes = {
        nl: '<strong>Voor publicatie:</strong> vervang de tekst tussen [haakjes] (naam en adres van de verwerkingsverantwoordelijke).',
        en: '<strong>Before publishing:</strong> replace the text in [brackets] (controller name and address).',
        it: '<strong>Prima di pubblicare:</strong> sostituisci il testo tra [parentesi] (nome e indirizzo del titolare).'
      };
      html += '<div class="placeholder-note">' + notes[lang] + '</div>';
    }
    for(const s of rest){
      html += '<h2>' + s.titolo + '</h2>';
      html += '<p>' + s.corpo + '</p>';
    }
    container.innerHTML = html;
    backSpan.textContent = d.back;
    document.documentElement.lang = lang;
    buttons.forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
    try { localStorage.setItem('tuffo-lang', lang); } catch(e){}
  }

  buttons.forEach(b => b.addEventListener('click', () => render(b.dataset.lang)));

  let initial = 'nl';
  try {
    const saved = localStorage.getItem('tuffo-lang');
    if(saved && data[saved]) initial = saved;
  } catch(e){}
  render(initial);
})();
</script>
