    <script>
    (function(){
      const data = JSON.parse(document.getElementById('data').textContent);
      const container = document.getElementById('content');
      const buttons = document.querySelectorAll('.lang-switcher button');
      const backLink = document.querySelector('[data-back]');
      const termsLink = document.querySelector('[data-terms]');

      function render(lang){
        const d = data[lang];
        const first = d.sections[0];
        const rest = d.sections.slice(1);
        let html = '';
        html += '<h1>' + first.titolo + '</h1>';
        const dateMatch = first.corpo.match(/^(Ultimo aggiornamento:[^.]+\.|Last updated:[^.]+\.|Laatst bijgewerkt:[^.]+\.)\s*/);
        if(dateMatch){
          html += '<p class="legal-updated">' + dateMatch[1] + '</p>';
          html += '<p>' + first.corpo.slice(dateMatch[0].length) + '</p>';
        } else {
          html += '<p>' + first.corpo + '</p>';
        }
        if(first.corpo.match(/\[[^\]]+\]/)){
          html += '<div class="legal-note">' + d.note + '</div>';
        }
        for(const s of rest){
          html += '<h2>' + s.titolo + '</h2>';
          html += '<p>' + s.corpo + '</p>';
        }
        container.innerHTML = html;
        backLink.textContent = d.back;
        termsLink.textContent = d.terms;
        document.documentElement.lang = lang;
        buttons.forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
        try { localStorage.setItem('ti-lang', lang); } catch(e){}
      }

      buttons.forEach(b => b.addEventListener('click', () => render(b.dataset.lang)));

      let initial = 'nl';
      try {
        const saved = localStorage.getItem('ti-lang');
        if(saved && data[saved]) initial = saved;
      } catch(e){}
      render(initial);
    })();
    </script>
