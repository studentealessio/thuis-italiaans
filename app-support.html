    <script src="js/consenso-modulo.js"></script>
    <script src="js/app-nav.js"></script>
    <script>
    (function(){
      const data = JSON.parse(document.getElementById('data').textContent);
      const container = document.getElementById('content');
      const buttons = document.querySelectorAll('.lang-switcher button');
      const RTL_LANGS = ['ar'];

      function render(lang){
        const d = data[lang];
        if(!d) return;
        let html = '';
        html += '<h1>' + d.intro_h1 + '</h1>';
        if(d.sottotitolo){
          html += '<p class="legal-updated">' + d.sottotitolo + '</p>';
        }
        if(d.intro_p){
          html += '<p>' + d.intro_p + '</p>';
        }
        for(const s of d.sections){
          html += '<h2>' + s.titolo + '</h2>';
          for(const p of (s.paragrafi || [])){
            html += '<p>' + p + '</p>';
          }
          if(s.lista && s.lista.length){
            html += '<ul class="legal-list">';
            for(const li of s.lista){
              html += '<li>' + li + '</li>';
            }
            html += '</ul>';
          }
        }
        container.innerHTML = html;
        document.documentElement.lang = lang;
        document.documentElement.dir = RTL_LANGS.includes(lang) ? 'rtl' : 'ltr';
        buttons.forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
        if(window.applyAppNav) window.applyAppNav(lang);
        try { localStorage.setItem('ti-lang', lang); } catch(e){}
      }

      buttons.forEach(b => b.addEventListener('click', () => render(b.dataset.lang)));

      let initial = 'it';
      try {
        const saved = localStorage.getItem('ti-lang');
        if(saved && data[saved]) initial = saved;
      } catch(e){}
      if(!localStorage.getItem('ti-lang')){
        const browserLang = (navigator.language || 'it').slice(0, 2).toLowerCase();
        if(data[browserLang]) initial = browserLang;
      }
      render(initial);
    })();
    </script>
