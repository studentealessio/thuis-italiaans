لتطبيق ←","mt_notice":"نعتذر — تُرجمت هذه النسخة آلياً وقد لا تكون بعض الصياغات دقيقة تماماً. إن لاحظت خطأً، فيرجى مراسلتنا على thuisitaliaans@gmail.com.","sections":[{"titolo":"شروط الاستخدام","corpo":"آخر تحديث: 20 يوليو 2026. باستخدامك تطبيق <em>ti</em> («التطبيق») فإنك تقبل هذه الشروط. التطبيق مقدَّم من Thuis Italiaans، thuisitaliaans@gmail.com."},{"titolo":"الترخيص","corpo":"نمنحك ترخيصاً شخصياً غير حصري وغير قابل للنقل لاستخدام التطبيق ومحتواه لأغراض التعلم الشخصي. لا يُسمح بنسخ المحتوى (النصوص، التمارين، القاموس، الروايات المتدرجة) أو توزيعه أو إعادة بيعه أو استخراجه بشكل منهجي خارج التطبيق."},{"titolo":"المحتوى والملكية الفكرية","corpo":"النصوص التعليمية، التمارين، النسخ المتدرجة من الروايات، الترجمات، الرسومات والبرامج محمية بحقوق النشر. © ti / thuisitaliaans.com — جميع الحقوق محفوظة. الأعمال الأدبية الأصلية المُقتبَسة تنتمي إلى المُلكية العامة؛ أما النسخ المتدرجة فهي من إنتاجنا الخاص ومحمية بصفتها كذلك."},{"titolo":"المشتريات والاشتراكات والتجديد","corpo":"يقدم التطبيق اشتراكات شهرية وسنوية بالتجديد التلقائي، ومشتراة Lifetime لمرة واحدة، ومشتريات فردية للمسارات والروايات. تُجدَّد الاشتراكات تلقائياً ما لم تُلغَ قبل نهاية الفترة بـ 24 ساعة على الأقل؛ يمكن إدارتها وإلغاؤها من إعدادات حساب Apple الخاص بك. تظهر الأسعار في التطبيق بعملتك المحلية قبل الشراء. تتوفَّر أيضاً خطة «قسيمة المدرسة»: اشتراك لمدة 6 أشهر يتجدد تلقائياً، يُفعَّل برمز من مدرستك."},{"titolo":"المحتوى المشمول في الخطط","corpo":"تشمل الخطط عدداً محدداً من المسارات التي تختارها (5 مع الشهري والسنوي، 6 مع Lifetime) من بين تلك المشار إليها في التطبيق؛ ويشمل Lifetime إضافةً إلى ذلك 3 روايات تختارها. الاختيارات نهائية. يظل المحتوى المشمول في الاشتراك متاحاً طالما أن الاشتراك نشط؛ أما المشتريات الفردية و Lifetime فلا تنتهي. قد تُباع العناوين المستقبلية بشكل منفصل."},{"titolo":"رموز الخصم","corpo":"رموز الخصم المحتملة (على سبيل المثال من المدارس الشريكة) تُستخدم مرة واحدة، وصالحة لحساب واحد فقط وعلى الخطة المحددة فقط، ويتم استبدالها من خلال نظام Apple. يُفعِّل رمز المدرسة خطة «قسيمة المدرسة» (6 أشهر بسعر 19,99 €): يتجدد الاشتراك تلقائياً ما لم يُلغَ من إعدادات حساب Apple الخاص بك."},{"titolo":"المبالغ المستردة","corpo":"تتم المشتريات عبر App Store: تُعالَج طلبات الاسترداد من قِبل Apple وفقاً لشروطها، على reportaproblem.apple.com."},{"titolo":"التحديثات والتوافر","corpo":"تصل المسارات والروايات الجديدة من خلال تحديثات التطبيق على App Store. نبذل قصارى جهدنا للحفاظ على عمل التطبيق ودقة المحتوى، لكن يُقدَّم التطبيق «كما هو»، بدون ضمان الخلو من الأخطاء. قد نُغيِّر أو نُوقِف الميزات غير الأساسية."},{"titolo":"الاستخدام الملائم","corpo":"لا يُسمح باستخدام التطبيق بشكل غير قانوني، أو محاولة الالتفاف على آليات الشراء أو الوصول إلى المحتوى، أو فك تجميع البرنامج بما يتجاوز ما يسمح به القانون."},{"titolo":"تحديد المسؤولية","corpo":"بالقدر الذي يسمح به القانون، تقتصر مسؤوليتنا على المبلغ الذي دفعته للتطبيق في آخر 12 شهراً. لا شيء في هذه الشروط يُقيِّد حقوق المستهلك الإلزامية."},{"titolo":"App Store (Apple) — بنود إضافية","corpo":"بالنسبة إلى نسخة التطبيق الموزَّعة عبر متجر App Store من Apple، تشكِّل هذه الشروط اتفاقية ترخيص المستخدم النهائي (EULA)، المبرمة حصراً بينك وبين Thuis Italiaans — وليس مع شركة Apple Inc. («Apple»). إن Thuis Italiaans، وليس Apple، هي المسؤولة وحدها عن التطبيق ومحتواه. إضافةً إلى ذلك: (أ) الترخيص محدود وغير قابل للنقل ويشمل استخدام التطبيق على أجهزة تحمل علامة Apple تملكها أو تتحكم فيها، وفق قواعد الاستخدام في شروط خدمة App Store (باستثناء الوصول من حسابات أخرى عبر المشاركة العائلية أو الشراء بالجملة)؛ (ب) إن Thuis Italiaans، وليس Apple، هي المسؤولة وحدها عن الصيانة والدعم؛ ولا يقع على Apple أي التزام بذلك؛ (ج) إذا لم يطابق التطبيق ضماناً سارياً، يمكنك إخطار Apple وستردّ لك Apple ثمن شراء التطبيق؛ وإلى أقصى حد يسمح به القانون، لا يقع على Apple أي التزام ضمان آخر؛ (د) إن Thuis Italiaans، وليس Apple، هي المسؤولة عن معالجة المطالبات المتعلقة بالتطبيق، بما في ذلك المسؤولية عن المنتج وعدم الامتثال للمتطلبات القانونية أو التنظيمية وحماية المستهلك؛ (هـ) في حال ادعاء طرف ثالث أن التطبيق ينتهك حقوق ملكية فكرية، فإن Thuis Italiaans، وليس Apple، هي المسؤولة وحدها عن التحقيق والدفاع والتسوية والإبراء؛ (و) تُقرّ بأنك لا تقيم في بلد يخضع لحظر من حكومة الولايات المتحدة أو مصنَّف بلداً «داعماً للإرهاب»، وأنك غير مدرج في أي قائمة أمريكية للأطراف المحظورة أو المقيَّدة؛ (ز) عند استخدام التطبيق عليك أيضاً الامتثال لأي شروط سارية لأطراف ثالثة؛ (ح) إن Apple وشركاتها التابعة أطراف ثالثة مستفيدة من هذه الشروط، وبقبولك يحقّ لـApple إنفاذها تجاهك. للأسئلة أو الشكاوى أو المطالبات: Thuis Italiaans, thuisitaliaans@gmail.com."},{"titolo":"التعديلات والقانون المعمول به","corpo":"قد نُحدِّث هذه الشروط؛ سيُعلَن عن التغييرات الجوهرية في التطبيق أو على هذه الصفحة. تخضع هذه الشروط للقانون الهولندي، مع عدم الإخلال بحقوق المستهلك. للتواصل: thuisitaliaans@gmail.com."}]},"bn":{"back":"← হোমপেজে ফিরে যান","privacy":"অ্যাপ গোপনীয়তা →","mt_notice":"দুঃখিত — এই সংস্করণটি স্বয়ংক্রিয়ভাবে অনূদিত এবং কিছু শব্দচয়ন সম্পূর্ণ সঠিক নাও হতে পারে। কোনো ত্রুটি দেখলে অনুগ্রহ করে thuisitaliaans@gmail.com-এ লিখুন।","sections":[{"titolo":"ব্যবহারের শর্তাবলী","corpo":"সর্বশেষ আপডেট: ২০ জুলাই ২০২৬। <em>ti</em> অ্যাপ (\"অ্যাপ\") ব্যবহার করে আপনি এই শর্তাবলী স্বীকার করছেন। অ্যাপটি সরবরাহ করে Thuis Italiaans, thuisitaliaans@gmail.com।"},{"titolo":"লাইসেন্স","corpo":"আমরা আপনাকে ব্যক্তিগত শিক্ষার উদ্দেশ্যে অ্যাপ ও এর বিষয়বস্তু ব্যবহারের জন্য একটি ব্যক্তিগত, অ-এক্সক্লুসিভ ও অ-হস্তান্তরযোগ্য লাইসেন্স প্রদান করি। অ্যাপের বাইরে বিষয়বস্তু (পাঠ্য, অনুশীলন, অভিধান, গ্রেডেড উপন্যাস) অনুলিপি করা, বিতরণ করা, পুনরায় বিক্রি করা বা পদ্ধতিগতভাবে নিষ্কাশন করা অনুমোদিত নয়।"},{"titolo":"বিষয়বস্তু ও বৌদ্ধিক সম্পত্তি","corpo":"শিক্ষামূলক পাঠ্য, অনুশীলন, উপন্যাসের গ্রেডেড অভিযোজন, অনুবাদ, গ্রাফিক্স ও সফ্টওয়্যার কপিরাইট দ্বারা সুরক্ষিত। © ti / thuisitaliaans.com — সমস্ত অধিকার সংরক্ষিত। অভিযোজিত মূল সাহিত্যকর্মগুলি সর্বজনীন ডোমেইনে; গ্রেডেড অভিযোজনগুলি আমাদের নিজস্ব কাজ এবং তেমনভাবে সুরক্ষিত।"},{"titolo":"ক্রয়, সাবস্ক্রিপশন ও নবায়ন","corpo":"অ্যাপটি স্বয়ংক্রিয় নবায়নসহ মাসিক ও বার্ষিক সাবস্ক্রিপশন, একবারে Lifetime ক্রয় এবং পথ ও উপন্যাসের পৃথক ক্রয়ের সুবিধা দেয়। মেয়াদ শেষ হওয়ার কমপক্ষে ২৪ ঘণ্টা আগে বাতিল না করা হলে সাবস্ক্রিপশন স্বয়ংক্রিয়ভাবে নবায়ন হয়; আপনার Apple অ্যাকাউন্ট সেটিংস থেকে এগুলি পরিচালনা ও বাতিল করা যায়। ক্রয়ের আগে অ্যাপে মূল্য আপনার স্থানীয় মুদ্রায় প্রদর্শিত হয়। এছাড়া “স্কুল ভাউচার” প্ল্যানও রয়েছে: ৬ মাসের স্বয়ংক্রিয়ভাবে নবায়নযোগ্য একটি সাবস্ক্রিপশন, যা আপনার স্কুলের কোড দিয়ে সক্রিয় হয়।"},{"titolo":"পরিকল্পনায় অন্তর্ভুক্ত বিষয়বস্তু","corpo":"পরিকল্পনাগুলিতে অ্যাপে নির্দেশিত কোর্সের মধ্যে থেকে আপনার পছন্দের একটি নির্দিষ্ট সংখ্যক পথ (মাসিক ও বার্ষিকে ৫টি, Lifetime-এ ৬টি) অন্তর্ভুক্ত থাকে; Lifetime অতিরিক্তভাবে আপনার পছন্দের ৩টি উপন্যাস অন্তর্ভুক্ত করে। পছন্দ চূড়ান্ত। সাবস্ক্রিপশনের সাথে অন্তর্ভুক্ত বিষয়বস্তু সাবস্ক্রিপশন সক্রিয় থাকা অবধি অ্যাক্সেসযোগ্য থাকে; পৃথক ক্রয় ও Lifetime-এর মেয়াদ শেষ হয় না। ভবিষ্যতের শিরোনাম আলাদাভাবে বিক্রি হতে পারে।"},{"titolo":"প্রোমো কোড","corpo":"যেকোনো প্রোমো কোড (উদাহরণস্বরূপ পার্টনার স্কুলগুলির থেকে) এককালীন ব্যবহারযোগ্য, শুধুমাত্র একটি অ্যাকাউন্টের জন্য এবং নির্দেশিত পরিকল্পনায় বৈধ, এবং Apple-এর সিস্টেমের মাধ্যমে ব্যবহার করা হয়। স্কুলের কোডটি “স্কুল ভাউচার” প্ল্যান সক্রিয় করে (৬ মাস, €১৯.৯৯): আপনার Apple অ্যাকাউন্ট সেটিংস থেকে বাতিল না করলে সাবস্ক্রিপশনটি স্বয়ংক্রিয়ভাবে নবায়ন হয়।"},{"titolo":"রিফান্ড","corpo":"ক্রয় App Store-এর মাধ্যমে হয়: রিফান্ডের অনুরোধ Apple তার শর্তাবলী অনুযায়ী পরিচালনা করে, reportaproblem.apple.com-এ।"},{"titolo":"আপডেট ও উপলব্ধতা","corpo":"নতুন পথ ও উপন্যাস App Store-এ অ্যাপ আপডেটের মাধ্যমে আসে। আমরা অ্যাপকে কার্যকর ও বিষয়বস্তু নির্ভুল রাখার জন্য যথাসাধ্য চেষ্টা করি, কিন্তু অ্যাপ \"যেমন আছে তেমন\" প্রদান করা হয়, ত্রুটি-মুক্তির গ্যারান্টি ছাড়া। আমরা অ-অপরিহার্য বৈশিষ্ট্যগুলি পরিবর্তন বা বন্ধ করতে পারি।"},{"titolo":"সঠিক ব্যবহার","corpo":"অ্যাপ অবৈধভাবে ব্যবহার করা, ক্রয় বা কন্টেন্ট অ্যাক্সেস প্রক্রিয়া বাইপাস করার চেষ্টা করা, বা আইন যা অনুমতি দেয় তার বাইরে সফ্টওয়্যার ডিকম্পাইল করা অনুমোদিত নয়।"},{"titolo":"দায়বদ্ধতার সীমা","corpo":"আইন যতটুকু অনুমতি দেয়, আমাদের দায়বদ্ধতা গত ১২ মাসে অ্যাপের জন্য আপনি যে পরিমাণ পরিশোধ করেছেন তার মধ্যে সীমাবদ্ধ। এই শর্তাবলীর কিছুই আপনার দেশের আইন অনুযায়ী বাধ্যতামূলক ভোক্তা অধিকার সীমাবদ্ধ করে না।"},{"titolo":"App Store (Apple) — অতিরিক্ত শর্তাবলী","corpo":"Apple-এর App Store-এর মাধ্যমে বিতরণ করা অ্যাপের সংস্করণের জন্য এই শর্তাবলীই চূড়ান্ত-ব্যবহারকারী লাইসেন্স চুক্তি (EULA), যা শুধুমাত্র আপনার এবং Thuis Italiaans-এর মধ্যে সম্পাদিত — Apple Inc. (“Apple”)-এর সঙ্গে নয়। অ্যাপ ও এর বিষয়বস্তুর জন্য এককভাবে দায়ী Thuis Italiaans, Apple নয়। এছাড়া: (ক) লাইসেন্সটি সীমিত, অ-হস্তান্তরযোগ্য এবং App Store পরিষেবার শর্তের ব্যবহারবিধি অনুযায়ী আপনার মালিকানাধীন বা নিয়ন্ত্রণাধীন Apple ডিভাইসে অ্যাপ ব্যবহারের জন্য প্রযোজ্য (তবে Family Sharing বা ভলিউম ক্রয়ের মাধ্যমে অন্য অ্যাকাউন্ট থেকে অ্যাপে প্রবেশ করা যেতে পারে); (খ) রক্ষণাবেক্ষণ ও সহায়তার জন্য এককভাবে দায়ী Thuis Italiaans, Apple নয়; Apple-এর কোনো বাধ্যবাধকতা নেই; (গ) অ্যাপ কোনো প্রযোজ্য ওয়ারেন্টি পূরণ না করলে আপনি Apple-কে জানাতে পারেন এবং Apple অ্যাপের ক্রয়মূল্য ফেরত দেবে; আইনে অনুমোদিত সর্বোচ্চ সীমা পর্যন্ত Apple-এর অন্য কোনো ওয়ারেন্টি দায় নেই; (ঘ) অ্যাপ-সংক্রান্ত দাবিগুলির (পণ্যের দায়, আইনি বা নিয়ন্ত্রক প্রয়োজনীয়তা না মানা, ভোক্তা সুরক্ষা সহ) জন্য দায়ী Thuis Italiaans, Apple নয়; (ঙ) কোনো তৃতীয় পক্ষ দাবি করলে যে অ্যাপটি মেধাস্বত্ব লঙ্ঘন করছে, তদন্ত, প্রতিরক্ষা, নিষ্পত্তি ও দায়মুক্তির জন্য এককভাবে দায়ী Thuis Italiaans, Apple নয়; (চ) আপনি ঘোষণা করছেন যে আপনি মার্কিন সরকারের নিষেধাজ্ঞাধীন বা “সন্ত্রাসে সহায়তাকারী” হিসেবে চিহ্নিত কোনো দেশে অবস্থান করছেন না এবং মার্কিন সরকারের নিষিদ্ধ বা সীমাবদ্ধ পক্ষের কোনো তালিকায় নেই; (ছ) অ্যাপ ব্যবহারের সময় প্রযোজ্য তৃতীয় পক্ষের শর্তাবলীও মানতে হবে; (জ) Apple ও তার সহযোগী প্রতিষ্ঠানগুলি এই শর্তাবলীর তৃতীয়-পক্ষ সুবিধাভোগী এবং আপনার গ্রহণের পর Apple আপনার বিরুদ্ধে এগুলি প্রয়োগের অধিকার রাখে। প্রশ্ন, অভিযোগ বা দাবি: Thuis Italiaans, thuisitaliaans@gmail.com।"},{"titolo":"পরিবর্তন ও প্রযোজ্য আইন","corpo":"আমরা এই শর্তাবলী আপডেট করতে পারি; মূল পরিবর্তনগুলি অ্যাপে বা এই পৃষ্ঠায় ঘোষণা করা হবে। এই শর্তাবলী নেদারল্যান্ডসের আইন দ্বারা পরিচালিত হয়, ভোক্তা অধিকারের titolo":"Codici sconto","corpo":"Gli eventuali codici sconto (per esempio delle scuole partner) sono monouso, valgono per un solo account e solo sul piano indicato, e sono riscattati tramite il sistema di Apple. Il codice della scuola attiva il piano «Voucher scuola» (6 mesi a € 19,99): l'abbonamento si rinnova automaticamente salvo disdetta, dalle impostazioni dell'account Apple."},{"titolo":"Rimborsi","corpo":"Gli acquisti avvengono tramite App Store: le richieste di rimborso sono gestite da Apple secondo le sue condizioni, da reportaproblem.apple.com."},{"titolo":"Aggiornamenti e disponibilità","corpo":"Nuovi percorsi e romanzi arrivano tramite aggiornamenti dell'App su App Store. Facciamo il possibile per mantenere l'App funzionante e i contenuti accurati, ma l'App è fornita \"così com'è\", senza garanzia di assenza di errori. Ci riserviamo di modificare o interrompere funzionalità non essenziali."},{"titolo":"Uso corretto","corpo":"Non è consentito usare l'App in modo illecito, tentare di aggirare i meccanismi di acquisto o di accesso ai contenuti, o decompilare il software oltre i limiti di legge."},{"titolo":"Limitazione di responsabilità","corpo":"Nei limiti consentiti dalla legge, la nostra responsabilità è limitata all'importo pagato per l'App negli ultimi 12 mesi. Nulla in questi termini limita i diritti inderogabili del consumatore previsti dalla legge del suo Paese."},{"titolo":"App Store (Apple) — clausole aggiuntive","corpo":"Per la versione dell'App distribuita tramite l'App Store di Apple, questi termini costituiscono il contratto di licenza con l'utente finale (EULA), concluso esclusivamente tra te e Thuis Italiaans — non con Apple Inc. («Apple»). Thuis Italiaans, e non Apple, è l'unica responsabile dell'App e dei suoi contenuti. Inoltre: (a) la licenza è limitata, non trasferibile e riguarda l'uso dell'App su prodotti a marchio Apple che possiedi o controlli, secondo le Regole d'uso dei Termini di servizio dell'App Store (salvo l'accesso da altri r ou extrair sistematicamente o conteúdo (textos, exercícios, dicionário, romances graduados) fora do App."},{"titolo":"Conteúdo e propriedade intelectual","corpo":"Textos didáticos, exercícios, adaptações graduadas dos romances, traduções, gráficos e software estão protegidos por direitos de autor. © ti / thuisitaliaans.com — todos os direitos reservados. As obras literárias originais adaptadas são de domínio público; as adaptações graduadas são nosso próprio trabalho e protegidas enquanto tal."},{"titolo":"Compras, subscrições e renovação","corpo":"O App oferece subscrições mensais e anuais com renovação automática, uma compra Lifetime única e compras individuais de percursos e romances. As subscrições renovam-se automaticamente salvo cancelamento com pelo menos 24 horas de antecedência antes do final do período; podes geri-las e cancelá-las nas definições da tua conta Apple. Os preços são mostrados no App na tua moeda local antes da compra. Está também disponível o plano «Voucher escola»: uma assinatura de 6 meses com renovação automática, ativada com um código da tua escola."},{"titolo":"Conteúdo incluído nos planos","corpo":"Os planos incluem um número definido de percursos à tua escolha (5 com Mensal e Anual, 6 com Lifetime) entre os indicados no App; o Lifetime inclui ainda 3 romances à tua escolha. As escolhas são definitivas. Os conteúdos incluídos numa subscrição permanecem acessíveis enquanto a subscrição estiver ativa; as compras individuais e o Lifetime não expiram. Títulos futuros podem ser vendidos separadamente."},{"titolo":"Códigos promocionais","corpo":"Eventuais códigos promocionais (por exemplo, vindos de escolas parceiras) são de utilização única, válidos apenas para uma conta e apenas no plano indicado, e são resgatados através do sistema da Apple. O código da escola ativa o plano «Voucher escola» (6 meses por 19,99 €): a assinatura renova-se automaticamente salvo cancelamento nas definições da tua conta Apple."},{"titolo":"Reembolsos","corpo":"As compras são realizadas através da App Store: os pedidos de reembolso são tratados pela Apple segundo as suas condições, em reportaproblem.apple.com."},{"titolo":"Atualizações e disponibilidade","corpo":"Novos percursos e romances chegam através de atualizações do App na App Store. Fazemos o nosso melhor para manter o App a funcionar e o conteúdo correto, mas o App é fornecido \"tal como está\", sem garantia de ausência de erros. Podemos alterar ou descontinuar funcionalidades não essenciais."},{"titolo":"Uso adequado","corpo":"Não é permitido usar o App de forma ilícita, tentar contornar os mecanismos de compra ou de acesso aos conteúdos, ou descompilar o software além do que a lei permite."},{"titolo":"Limitação de responsabilidade","corpo":"Na medida permitida por lei, a nossa responsabilidade limita-se ao valor pago pelo App nos últimos 12 meses. Nada nestes termos limita os direitos imperativos do consumidor."},{"titolo":"App Store (Apple) — cláusulas adicionais","corpo":"Para a versão do App distribuída através da App Store da Apple, estes termos constituem o contrato de licença de utilizador final (EULA), celebrado exclusivamente entre você e a Thuis Italiaans — não com a Apple Inc. («Apple»). A Thuis Italiaans, e não a Apple, é a única responsável pelo App e pelo seu conteúdo. Além disso: (a) a licença é limitada, intransferível e abrange o uso do App em produtos da marca Apple que você possua ou controle, conforme as Regras de Uso dos Termos de Serviço da App Store (exceto o acesso por outras contas através da Partilha com a Família ou compras por volume); (b) a Thuis Italiaans, e não a Apple, é a única responsável pela manutenção e pelo suporte; a Apple não tem qualquer obrigação nesse sentido; (c) se o App não cumprir uma garantia aplicável, você pode notificar a Apple, que reembolsará o preço de compra do App; na máxima medida permitida por lei, a Apple não tem qualquer outra obrigação de garantia; (d) a Thuis Italiaans, e não a Apple, responde pelas reclamações relativas ao App, incluindo responsabilidade pelo produto, incumprimento de requisitos legais ou regulamentares e proteção do consumidor; (e) em caso de reclamação de terceiros por violação de direitos de propriedade intelectual, a Thuis Italiaans, e não a Apple, é a única responsável pela investigação, defesa, acordo e resolução; (f) você declara que não se encontra num país sujeito a embargo do Governo dos EUA nem designado como «apoiante do terrorismo», e que não consta de nenhuma lista norte-americana de partes proibidas ou restritas; (g) ao usar o App deve cumprir também os termos de terceiros aplicáveis; (h) a Apple e as suas subsidiárias são terceiros beneficiários destes termos e, com a sua aceitação, a Apple tem o direito de os fazer valer contra você. Perguntas, queixas ou reclamações: Thuis Italiaans, thuisitaliaans@gmail.com."},{"titolo":"Alterações e lei aplicável","corpo":"Podemos atualizar estes termos; alterações substanciais serão anunciadas no App ou nesta página. Estes termos regem-se pela lei dos Países Baixos, sem prejuízo dos direitos do consumidor. Contacto: thuisitaliaans@gmail.com."}]},"ro":{"back":"← Înapoi la pagina principală","privacy":"Confidențialitate app →","mt_notice":"Ne pare rău — această versiune a fost tradusă automat, iar unele formulări ar putea să nu fie complet precise. Dacă observi vreo problemă, scrie la thuisitaliaans@gmail.com.","sections":[{"titolo":"Termeni de utilizare","corpo":"Ultima actualizare: 20 iulie 2026. Prin utilizarea aplicației <em>ti</em> („Aplicația\") accepți acești termeni. Aplicația este oferită de Thuis Italiaans, thuisitaliaans@gmail.com."},{"titolo":"Licență","corpo":"Îți acordăm o licență personală, neexclusivă și netransferabilă pentru a utiliza Aplicația și conținutul său în scop de învățare personală. Nu este permis să copiezi, distribui, revinzi sau extragi sistematic conținutul (texte, exerciții, dicționar, romane gradate) în afara Aplicației."},{"titolo":"Conținut și proprietate intelectuală","corpo":"Textele didactice, exercițiile, adaptările gradate ale romanelor, traducerile, grafica și software-ul sunt protejate prin drepturi de autor. © ti / thuisitaliaans.com — toate drepturile rezervate. Operele literare originale adaptate sunt în domeniul public; adaptările gradate sunt munca noastră și sunt protejate ca atare."},{"titolo":"Achiziții, abonamente și reînnoire","corpo":"Aplicația oferă abonamente lunare și anuale cu reînnoire automată, o achiziție Lifetime unică și achiziții individuale de parcursuri și romane. Abonamentele se reînnoiesc automat dacă nu sunt anulate cu cel puțin 24 de ore înainte de sfârșitul perioadei; le poți gestiona și anula din setările contului tău Apple. Prețurile sunt afișate în Aplicație în moneda ta locală înainte de achiziție. Este disponibil și planul „Voucher școlar”: un abonament de 6 luni cu reînnoire automată, activat cu un cod de la școala ta."},{"titolo":"Conținut inclus în planuri","corpo":"Planurile includ un număr definit de parcursuri la alegere (5 la Lunar și Anual, 6 la Lifetime) dintre cele disponibile în Aplicație; Lifetime include în plus 3 romane la alegere. Alegerile sunt definitive. Conținutul inclus într-un abonament rămâne accesibil atâta timp cât abonamentul este activ; achizițiile individuale și Lifetime nu expiră. Titluri viitoare pot fi vândute separat."},{"titolo":"Coduri promo","corpo":"Eventualele coduri promo (de exemplu de la școli partenere) sunt de unică utilizare, valabile pentru un singur cont și doar pe planul indicat, și sunt răscumpărate prin sistemul Apple. Codul școlii activează planul „Voucher școlar” (6 luni la 19,99 €): abonamentul se reînnoiește automat dacă nu este anulat din setările contului tău Apple."},{"titolo":"Rambursări","corpo":"Achizițiile se fac prin App Store: cererile de rambursare sunt gestionate de Apple conform condițiilor sale, la reportaproblem.apple.com."},{"titolo":"Actualizări și disponibilitate","corpo":"Noile parcursuri și romane sosesc prin rivind încălcarea drepturilor de proprietate intelectuală, Thuis Italiaans, nu Apple, este singura responsabilă pentru investigare, apărare, soluționare și stingere; (f) declari că nu te afli într-o țară supusă unui embargo al Guvernului SUA sau desemnată ca „susținătoare a terorismului” și că nu figurezi pe nicio listă americană de părți interzise sau restricționate; (g) la utilizarea Aplicației trebuie să respecți și eventualii termeni ai terților aplicabili; (h) Apple și filialele sale sunt terți beneficiari ai acestor termeni și, odată cu acceptarea ta, Apple are dreptul să îi aplice împotriva ta. Întrebări, plângeri sau reclamații: Thuis Italiaans, thuisitaliaans@gmail.com."},{"titolo":"Modificări și lege aplicabilă","corpo":"Putem actualiza acești termeni; modificările substanțiale vor fi anunțate în Aplicație sau pe această pagină. Acești termeni sunt guvernați de legea Țărilor de Jos, fără a afecta drepturile consumatorului. Contact: thuisitaliaans@gmail.com."}]},"tl":{"back":"← Bumalik sa homepage","privacy":"Privacy ng app →","mt_notice":"Paumanhin — awtomatikong isinalin ang bersyong ito at ang ilang mga salita ay maaaring hindi ganap na tama. Kung may makita kang mali, mangyaring sumulat sa thuisitaliaans@gmail.com.","sections":[{"titolo":"Mga tuntunin ng paggamit","corpo":"Huling na-update: 20 Hulyo 2026. Sa paggamit ng <em>ti</em> app (\"ang App\") tinatanggap mo ang mga tuntuning ito. Ang App ay ibinibigay ng Thuis Italiaans, thuisitaliaans@gmail.com."},{"titolo":"Lisensya","corpo":"Nagbibigay kami sa iyo ng personal, hindi eksklusibo at hindi maililipat na lisensya upang gamitin ang App at ang nilalaman nito para sa personal na pag-aaral. Hindi pinahihintulutan na kopyahin, ipamahagi, ibenta muli o sistematikong kunin ang nilalaman (mga teksto, ehersisyo, diksyunaryo, mga graded na nobela) sa labas ng App."},{"titolo":"Nilalaman at intelektwal na pag-aari","corpo":"Ang mga tekstong panturo, ehersisyo, graded na mga adaptasyon ng mga nobela, pagsasalin, graphics at software ay protektado ng karapatang-ari. © ti / thuisitaliaans.com — lahat ng karapatan ay nakalaan. Ang orihinal na mga akdang pampanitikang inadapt ay nasa public domain; ang graded na adaptasyon ay aming sariling gawa at protektado bilang tulad."},{"titolo":"Mga pagbili, subscription at pagpapa-renew","corpo":"Nag-aalok ang App ng buwanan at taunang mga subscription na awtomatikong nire-renew, isang beses na pagbili ng Lifetime, at mga indibidwal na pagbili ng mga kurso at nobela. Awtomatikong nire-renew ang mga subscription maliban kung kanselahin nang hindi bababa sa 24 na oras bago matapos ang panahon; maaaring pamahalaan at kanselahin ang mga ito sa mga setting ng iyong Apple account. Ang mga presyo ay ipinapakita sa App sa iyong lokal na pera bago bumili. Mayroon ding planong “School Voucher”: isang 6 na buwang subscription na awtomatikong nagre-renew, na ina-activate gamit ang code mula sa iyong paaralan."},{"titolo":"Nilalaman na kasama sa mga plano","corpo":"Kasama sa mga plano ang isang tinukoy na bilang ng mga kurso na iyong pipiliin (5 sa Buwanan at Taunan, 6 sa Lifetime) mula sa mga ipinahiwatig sa App; kasama rin sa Lifetime ang 3 nobela na iyong pipiliin. Ang mga pagpili ay pinal. Ang nilalamang kasama sa subscription ay mananatiling madaling ma-access habang aktibo ang subscription; hindi nag-e-expire ang mga indibidwal na pagbili at Lifetime. Ang mga hinaharap na pamagat ay maaaring ibenta nang hiwalay."},{"titolo":"Mga promo code","corpo":"Ang anumang promo code (halimbawa mula sa mga partner na paaralan) ay para sa isang beses lamang, wasto para sa isang account lamang at sa ipinahiwatig na plano lamang, at natutubos sa pamamagitan ng sistema ng Apple. Ina-activate ng code ng paaralan ang planong “School Voucher” (6 na buwan sa €19.99): awtomatikong nagre-renew ang subscription maliban kung kanselahin sa mga setting ng iyong Apple account."},{"titolo":"Mga refund","corpo":"Ang mga pagbili ay dumadaan sa App Store: ang mga kahilingan sa refund ay hinahawakan ng Apple ayon sa mga kondisyon nito, sa reportaproblem.apple.com."},{"titolo":"Mga update at pagkakaroon","corpo":"Dumarating ang mga bagong kurso at nobela sa pamamagitan ng mga update sa App sa App Store. Ginagawa namin ang aming makakaya upang mapanatili ang App na gumagana at tama ang nilalaman, ngunit ibinibigay ang App na \"as is\", walang garantiya ng kalayaan sa mga error. Maaari naming baguhin o ihinto ang mga di-mahalagang tampok."},{"titolo":"Katanggap-tanggap na paggamit","corpo":"Hindi mo maaaring gamitin ang App nang labag sa batas, subukang i-bypass ang mga mekanismo ng pagbili o pag-access sa nilalaman, o i-decompile ang software lampas sa pinahihintulutan ng batas."},{"titolo":"Limitasyon ng pananagutan","corpo":"Sa lawak na pinahihintulutan ng batas, ang aming pananagutan ay limitado sa halagang iyong binayaran para sa App sa nakalipas na 12 buwan. Walang anuman sa mga tuntuning ito na naglilimita sa ipinag-uutos na mga karapatan ng mamimili sa ilalim ng batas ng iyong bansa."},{"titolo":"App Store (Apple) — karagdagang tuntunin","corpo":"Para sa bersiyon ng App na ipinamamahagi sa pamamagitan ng Apple App Store, ang mga tuntuning ito ang bumubuo sa end-user license agreement (EULA), na pinagtibay lamang sa pagitan mo at ng Thuis Italiaans — hindi ng Apple Inc. (“Apple”). Ang Thuis Italiaans, hindi ang Apple, ang tanging may pananagutan sa App at sa nilalaman nito. Dagdag pa: (a) ang lisensiya ay limitado, hindi naililipat at sumasaklaw sa paggamit ng App sa mga produktong Apple na pagmamay-ari o kontrolado mo, ayon sa Usage Rules ng App Store Terms of Service (maliban sa pag-access ng ibang account sa pamamagitan ng Family Sharing o volume purchasing); (b) ang Thuis Italiaans, hindi ang Apple, ang tanging may pananagutan sa maintenance at suporta; walang anumang obligasyon ang Apple; (c) kung hindi tumupad ang App sa isang naaangkop na warranty, maaari mong ipagbigay-alam sa Apple at ire-refund ng Apple ang halaga ng p ати, поширювати, перепродавати або систематично витягувати вміст (тексти, вправи, словник, адаптовані романи) поза межами Застосунку."},{"titolo":"Вміст та інтелектуальна власність","corpo":"Навчальні тексти, вправи, адаптовані варіанти романів, переклади, графіка та програмне забезпечення захищені авторським правом. © ti / thuisitaliaans.com — усі права застережено. Оригінальні літературні твори, які було адаптовано, належать до суспільного надбання; адаптовані варіанти є нашою власною роботою і захищені як такі."},{"titolo":"Покупки, підписки та поновлення","corpo":"Застосунок пропонує щомісячні та щорічні підписки з автоматичним поновленням, одноразову покупку Lifetime та окремі покупки курсів і романів. Підписки поновлюються автоматично, якщо не скасовані принаймні за 24 години до закінчення періоду; керувати ними та скасовувати можна в налаштуваннях облікового запису Apple. Ціни відображаються в Застосунку у твоїй місцевій валюті перед покупкою. Доступний також план «Шкільний ваучер»: підписка на 6 місяців з автоматичним поновленням, що активується кодом від вашої школи."},{"titolo":"Вміст, включений у плани","corpo":"Плани містять визначену кількість курсів на твій вибір (5 у Місячному та Річному, 6 у Lifetime) з тих, які зазначені в Застосунку; Lifetime додатково включає 3 романи на твій вибір. Вибір є остаточним. Вміст, включений до підписки, залишається доступним, поки підписка активна; окремі покупки та Lifetime не закінчуються. Майбутні заголовки можуть продаватися окремо."},{"titolo":"Промокоди","corpo":"Будь-які промокоди (наприклад від шкіл-партнерів) є одноразовими, дійсними лише для одного облікового запису та лише для зазначеного плану, і активуються через систему Apple. Код школи активує план «Шкільний ваучер» (6 місяців за €19,99): підписка поновлюється автоматично, якщо її не скасувати в налаштуваннях облікового запису Apple."},{"titolo":"Повернення коштів","corpo":"Покупки здійснюються через App Store: запити на повернення коштів обробляються Apple згідно з її умовами, на reportaproblem.apple.com."},{"titolo":"Оновлення та доступність","corpo":"Нові курси та романи надходять через оновлення Застосунку в App Store. Ми робимо все можливе, щоб Застосунок працював, а вміст був точним, але Застосунок надається «як є», без гарантії відсутності помилок. Ми можемо змінювати або припиняти несуттєві функції."},{"titolo":"Належне використання","corpo":"Заборонено використовувати Застосунок незаконно, намагатися обійти механізми покупки або доступу до вмісту, або декомпілювати програмне забезпечення поза межами дозволеного законом."},{"titolo":"Обмеження відповідальності","corpo":"У межах, дозволених законом, наша відповідальність обмежена сумою, яку ти сплатив за Застосунок за останні 12 місяців. Ніщо в цих умовах не обмежує імперативні права споживача."},{"titolo":"App Store (Apple) — додаткові умови","corpo":"Для версії Застосунку, що розповсюджується через App Store компанії Apple, ці умови є ліцензійною угодою з кінцевим користувачем (EULA), укладеною виключно між тобою та Thuis Italiaans — не з Apple Inc. («Apple»). Саме Thuis Italiaans, а не Apple, несе повну відповідальність за Застосунок і його вміст. Крім того: (a) ліцензія є обмеженою, непередаваною і поширюється на використання Застосунку на пристроях Apple, якими ти володієш або керуєш, згідно з Правилами використання Умов обслуговування App Store (за винятком доступу з інших облікових записів через Сімейний доступ або корпоративні закупівлі); (b) саме Thuis Italiaans, а не Apple, відповідає за обслуговування та підтримку; Apple не має жодних зобов'язань; (c) якщо Застосунок не відповідає застосовній гарантії, ти можеш повідомити Apple, і Apple поверне тобі вартість покупки Застосунку; у максимально дозволених законом межах Apple не має інших гарантійних зобов'язань; (d) саме Thuis Italiaans, а не Apple, відповідає за претензії щодо Застосунку, включно з відповідальністю за продукт, невідповідністю законодавчим чи регуляторним вимогам і захистом прав спож     <script src="js/app-nav.js"></script>
    <script>
    (function(){
      const data = JSON.parse(document.getElementById('data').textContent);
      const container = document.getElementById('content');
      const buttons = document.querySelectorAll('.lang-switcher button');
      const RTL_LANGS = ['ar'];

      function render(lang){
        const d = data[lang];
        if(!d) return;
        const first = d.sections[0];
        const rest = d.sections.slice(1);
        let html = '';
        html += '<h1>' + first.titolo + '</h1>';
        const dateMatch = first.corpo.match(/^(Ultimo aggiornamento:[^.]+\.|Last updated:[^.]+\.|Laatst bijgewerkt:[^.]+\.|Zuletzt aktualisiert:[^.]+\.|Dernière mise à jour[^.]+\.|Última actualización:[^.]+\.|Última atualização:[^.]+\.|Ultima actualizare:[^.]+\.|Останнє оновлення:[^.]+\.|Përditësuar së fundmi:[^.]+\.|آخر تحديث:[^.]+\.|সর্বশেষ আপডেট:[^.]+।|最后更新:[^。]+。|Huling na-update:[^.]+\.|ናይ መወዳእታ ምዕባለ[^።]+።)\s*/);
        if(dateMatch){
          html += '<p class="legal-updated">' + dateMatch[1].trim() + '</p>';
          html += '<p>' + first.corpo.slice(dateMatch[0].length) + '</p>';
        } else {
          html += '<p>' + first.corpo + '</p>';
        }
        for(const s of rest){
          html += '<h2>' + s.titolo + '</h2>';
          html += '<p>' + s.corpo + '</p>';
        }
        container.innerHTML = html;
        document.documentElement.lang = lang;
        document.documentElement.dir = RTL_LANGS.includes(lang) ? 'rtl' : 'ltr';
        buttons.forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
        if(window.applyAppNav) window.applyAppNav(lang);
        try { localStorage.setItem('ti-lang', lang); } catch(e){}
      }

      buttons.forEach(b => b.addEventListener('click', () => render(b.dataset.lang)));

      let initial = 'nl';
      try {
        const saved = localStorage.getItem('ti-lang');
        if(saved && data[saved]) initial = saved;
      } catch(e){}
      // browser language auto-detect on first visit
      if(!localStorage.getItem('ti-lang')){
        const browserLang = (navigator.language || 'nl').slice(0, 2).toLowerCase();
        if(data[browserLang]) initial = browserLang;
      }
      render(initial);
    })();
    </script>
